<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Hari Raya Idul Fitri</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-success overflow-hidden">
    <div
      class="vh-100 d-flex flex-column justify-content-center align-items-center position-relative"
    >
      <img
        src="assets/images/bg-idul-fitri.jpg.jpg"
        class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover opacity-25"
        alt="Background Idul Fitri"
      />

      <div class="position-relative z-1 text-center px-4">
        <h1
          class="display-1 fw-bolder text-warning mb-3 shadow-sm"
          style="text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5)"
        >
          Selamat Hari Raya Idul Fitri
        </h1>
        <p class="fs-3 fw-medium text-white mb-5">
          Minal Aidin Wal Faizin, Mohon Maaf Lahir dan Batin
        </p>

        <button
          type="button"
          class="btn btn-warning btn-lg px-5 py-3 rounded-pill fw-bold text-dark shadow-lg fs-4"
          data-bs-toggle="modal"
          data-bs-target="#thrModal"
        >
          Klik untuk mendapatkan THR 💸
        </button>
      </div>
    </div>

    <div
      class="modal fade"
      id="thrModal"
      tabindex="-1"
      aria-labelledby="thrModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
          <div class="modal-body text-center p-4">
            <div
              class="position-absolute top-0 start-50 translate-middle-x"
              style="margin-top: -50px"
            >
              <img
                src="assets/images/amplop-thr.jpg"
                class="rounded-circle border border-5 border-white shadow"
                alt="Foto Profil"
                style="width: 100px; height: 100px; object-fit: cover"
              />
            </div>

            <div class="mt-5 pt-3">
              <h2 class="fw-bold text-success mb-2">Alhamdulillah!</h2>
              <h5 class="text-dark mb-3">Selamat Anda Mendapatkan</h5>

              <div
                class="bg-warning bg-opacity-25 border border-warning border-2 rounded-4 p-3 mb-3 shadow-sm mx-auto"
                style="max-width: 300px"
              >
                <h2 class="display-5 fw-bolder text-success m-0">
                  Rp 2.000.000
                </h2>
              </div>

              <p class="text-muted mb-4 small">
                Semoga rezeki ini bermanfaat dan menambah kebahagiaan di hari
                kemenangan bersama keluarga tercinta.
              </p>

              <button
                type="button"
                class="btn btn-success w-100 py-3 rounded-pill fw-bold"
                data-bs-dismiss="modal"
              >
                Aamiin, Terima Kasih Banyak!
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
